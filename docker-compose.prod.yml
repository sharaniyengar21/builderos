services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: builderos
      POSTGRES_PASSWORD: builderos
      POSTGRES_DB: builderos
    volumes:
      - builderos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U builderos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - builderos_redis_data:/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://builderos:builderos@postgres:5432/builderos
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  builderos_postgres_data:
  builderos_redis_data:
